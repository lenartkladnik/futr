<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futr-404</title>
  <style>
    :root {
      --accent: #c9e36c;
      --bg: #111214;
      color-scheme: dark;
      font-family: Manrope, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: var(--bg);
    }

    main {
      width: min(100%, 420px);
      border: 1px solid #32363d;
      border-radius: 18px;
      padding: 28px;
      background: #1a1c1f;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      color: var(--accent);
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 56px;
      line-height: 1;
    }

    p {
      margin: 0 0 24px;
      color: #a1a5ad;
    }

    a {
      display: inline-block;
      border-radius: 8px;
      padding: 12px 18px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>

<body>
  <main>
    <h1>404</h1>
    <p>Page not found.</p>
    <a href="/">Go home</a>
  </main>
</body>

</html>
