<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Futr-500</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Manrope, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      background: #111214;
    }

    main {
      width: min(100%, 420px);
      border: 1px solid #32363d;
      border-radius: 18px;
      padding: 28px;
      background: #1a1c1f;
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      color: #c9e36c;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 56px;
      line-height: 1;
    }

    p {
      margin: 0;
      color: #a1a5ad;
    }
  </style>
</head>

<body>
  <main>
    <h1>500</h1>
    <p>Internal server error.</p>
  </main>
</body>

</html>
